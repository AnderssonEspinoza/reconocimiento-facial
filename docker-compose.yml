services:
  postgres-service:
    image: postgres:16-alpine
    container_name: postgres-service-pdp
    environment:
      POSTGRES_DB: faceaccess
      POSTGRES_USER: faceaccess
      POSTGRES_PASSWORD: faceaccess
      TZ: America/Lima
      PGTZ: America/Lima
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faceaccess -d faceaccess"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  device-service:
    build:
      context: ./services/device
      dockerfile: Dockerfile
    container_name: device-service-pdp
    ports:
      - "8001:8001"
    environment:
      ARDUINO_PORT: "${ARDUINO_PORT:-}"
      SERIAL_BAUDRATE: "9600"
      TZ: America/Lima
    privileged: true
    volumes:
      - /dev:/dev
    restart: unless-stopped

  face-service:
    build:
      context: ./services/face
      dockerfile: Dockerfile
    container_name: face-service-pdp
    depends_on:
      postgres-service:
        condition: service_healthy
      device-service:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      PLEX_URL: "http://host.docker.internal:32400/web"
      DEVICE_SERVICE_URL: "http://device-service:8001"
      DB_URL: "postgresql://faceaccess:faceaccess@postgres-service:5432/faceaccess"
      TZ: America/Lima
      FOTO_REFERENCIA_PATH: "/app/data/foto_referencia.png"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    privileged: true
    volumes:
      - ./services/face/app.py:/app/app.py
      - ./services/face/faceaccess.html:/app/faceaccess.html
      - ./data:/app/data
      - ./registro_accesos.csv:/app/registro_accesos.csv
      - ./intrusos:/app/intrusos
      - /dev:/dev
    restart: unless-stopped

volumes:
  postgres_data:
